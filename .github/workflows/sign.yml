name: AliyunDrive Auto Sign

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sign:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install requests
        run: pip install requests

      - name: Run sign
        env:
          ALIYUN_REFRESH_TOKEN: ${{ secrets.ALIYUN_REFRESH_TOKEN }}
        run: python sign.py

      - name: Update Refresh Token
        uses: gliech/create-github-secret-action@v1
        with:
          name: ALIYUN_REFRESH_TOKEN
          value: ${{ env.NEW_REFRESH_TOKEN }}
          pa_token: ${{ secrets.GH_TOKEN }}
